<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول الإدارة - A.H</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container" style="padding: 60px 0">
      <div class="about-card" style="max-width: 520px; margin: 0 auto">
        <h2>تسجيل دخول الإدارة</h2>
        <p>أدخل كلمة مرور المسؤول للوصول إلى لوحة التحكم.</p>
        <label>
          <span>كلمة المرور</span>
          <input type="password" id="adminPassword" placeholder="كلمة المرور" />
        </label>
        <button class="btn btn-primary" onclick="loginAdmin()">
          تسجيل الدخول
        </button>
      </div>
    </main>

    <script>
      function loginAdmin() {
        const password = document.getElementById("adminPassword").value.trim();
        if (!password) {
          alert("الرجاء إدخال كلمة المرور");
          return;
        }
        if (password === "admin123") {
          localStorage.setItem("ah_admin", "true");
          window.location.href = "admin-dashboard.html";
          return;
        }
        alert("كلمة المرور غير صحيحة");
      }
    </script>
  </body>
</html>
