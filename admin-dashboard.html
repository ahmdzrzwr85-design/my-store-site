<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة الإدارة - A.H</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container" style="padding: 24px 0">
      <div class="topbar">
        <div class="brand">
          <div class="brand-logo">A.H</div>
          <div>
            <div class="brand-title">لوحة الإدارة</div>
            <div class="brand-subtitle">تحكم في المنتجات والطلبات</div>
          </div>
        </div>
        <button class="btn btn-secondary" onclick="logout()">
          تسجيل الخروج
        </button>
      </div>

      <section class="about-card">
        <h2>إدارة المتجر</h2>
        <div class="admin-grid">
          <div class="admin-card">
            <h3>إضافة منتج جديد</h3>
            <label>
              <span>اسم المنتج</span>
              <input type="text" id="newName" />
            </label>
            <label>
              <span>الوصف</span>
              <textarea id="newDescription" rows="3"></textarea>
            </label>
            <label>
              <span>الفئة</span>
              <input type="text" id="newCategory" />
            </label>
            <label>
              <span>السعر</span>
              <input type="number" id="newPrice" />
            </label>
            <label>
              <span>رابط الصورة</span>
              <input type="text" id="newImage" />
            </label>
            <button class="btn btn-primary" onclick="createProduct()">
              إضافة المنتج
            </button>
            <div id="adminMessage"></div>
          </div>
          <div class="admin-card">
            <h3>بحث المنتجات</h3>
            <label>
              <span>بحث بالكلمة</span>
              <input type="text" id="searchQuery" oninput="loadProducts()" />
            </label>
            <label>
              <span>التصنيف</span>
              <select id="categoryFilter" onchange="loadProducts()">
                <option value="">الكل</option>
                <option value="ملابس">ملابس</option>
                <option value="حقائب">حقائب</option>
                <option value="أحذية">أحذية</option>
                <option value="اكسسوارات">اكسسوارات</option>
              </select>
            </label>
            <label>
              <span>أقل سعر</span>
              <input type="number" id="minPrice" oninput="loadProducts()" />
            </label>
            <label>
              <span>أعلى سعر</span>
              <input type="number" id="maxPrice" oninput="loadProducts()" />
            </label>
          </div>
        </div>
      </section>

      <section class="about-card" style="margin-top: 20px">
        <h3>المنتجات</h3>
        <div id="productsTable"></div>
      </section>

      <section class="about-card" style="margin-top: 20px">
        <h3>الطلبات</h3>
        <div id="ordersTable"></div>
      </section>

      <section class="about-card" style="margin-top: 20px">
        <h3>العملاء</h3>
        <div id="customersTable"></div>
      </section>
    </main>

    <script>
      const adminKey = "ah_admin";

      function ensureAuth() {
        if (localStorage.getItem(adminKey) !== "true") {
          window.location.href = "admin-login.html";
        }
      }

      function logout() {
        localStorage.removeItem(adminKey);
        window.location.href = "admin-login.html";
      }

      async function apiFetch(path, options) {
        const headers = {
          "Content-Type": "application/json",
          "x-admin-password": "admin123",
        };
        const response = await fetch(path, { headers, ...options });
        if (!response.ok) {
          throw new Error(await response.text());
        }
        return response.json();
      }

      async function loadProducts() {
        const query = document
          .getElementById("searchQuery")
          .value.trim()
          .toLowerCase();
        const category = document.getElementById("categoryFilter").value;
        const minPrice = Number(document.getElementById("minPrice").value || 0);
        const maxPrice = Number(document.getElementById("maxPrice").value || 0);

        const products = await apiFetch("/api/products");
        const filtered = products.filter((item) => {
          const matchesText =
            item.name.toLowerCase().includes(query) ||
            item.description.toLowerCase().includes(query);
          const matchesCategory = category ? item.category === category : true;
          const matchesPrice =
            item.price >= minPrice &&
            (maxPrice === 0 || item.price <= maxPrice);
          return matchesText && matchesCategory && matchesPrice;
        });

        document.getElementById("productsTable").innerHTML = filtered
          .map(
            (item) => `
            <div class="product-row">
              <div>
                <strong>${item.name}</strong>
                <p>${item.category} • ${item.price} ج</p>
              </div>
              <div class="admin-actions">
                <button onclick='editProduct(${item.id})' class="btn btn-secondary">تعديل</button>
                <button onclick='deleteProduct(${item.id})' class="btn btn-danger">حذف</button>
              </div>
            </div>
          `,
          )
          .join("");
      }

      async function loadOrders() {
        const orders = await apiFetch("/api/orders");
        document.getElementById("ordersTable").innerHTML = orders
          .map(
            (order) => `
            <div class="order-row">
              <div>
                <strong>${order.id}</strong>
                <p>${order.customer.name} — ${order.customer.phone}</p>
                <p>${order.items.length} منتجات — ${order.status || "جديد"}</p>
              </div>
              <div>
                <select onchange='updateOrderStatus("${order.id}", this.value)'>
                  <option value="new" ${order.status === "new" ? "selected" : ""}>جديد</option>
                  <option value="processing" ${order.status === "processing" ? "selected" : ""}>قيد التنفيذ</option>
                  <option value="shipped" ${order.status === "shipped" ? "selected" : ""}>تم الشحن</option>
                </select>
              </div>
            </div>
          `,
          )
          .join("");
      }

      async function loadCustomers() {
        const customers = await apiFetch("/api/customers");
        document.getElementById("customersTable").innerHTML = customers
          .map(
            (customer) => `
            <div class="customer-row">
              <div>
                <strong>${customer.name}</strong>
                <p>${customer.phone}</p>
                <p>${customer.address}</p>
              </div>
            </div>
          `,
          )
          .join("");
      }

      async function createProduct() {
        const product = {
          name: document.getElementById("newName").value.trim(),
          description: document.getElementById("newDescription").value.trim(),
          category: document.getElementById("newCategory").value.trim(),
          price: Number(document.getElementById("newPrice").value),
          image: document.getElementById("newImage").value.trim(),
        };
        if (
          !product.name ||
          !product.description ||
          !product.category ||
          !product.price
        ) {
          return alert("أكمل بيانات المنتج بالكامل");
        }
        await apiFetch("/api/products", {
          method: "POST",
          body: JSON.stringify(product),
        });
        document.getElementById("adminMessage").textContent =
          "تم إضافة المنتج بنجاح";
        loadProducts();
      }

      async function editProduct(id) {
        const product = await apiFetch(`/api/products`);
        const item = product.find((p) => p.id === id);
        if (!item) return alert("المنتج غير موجود");

        const name = prompt("اسم المنتج", item.name);
        if (!name) return;
        const description = prompt("الوصف", item.description);
        if (!description) return;
        const category = prompt("الفئة", item.category);
        if (!category) return;
        const price = Number(prompt("السعر", item.price));
        if (!price) return;

        await apiFetch(`/api/products/${id}`, {
          method: "PUT",
          body: JSON.stringify({ name, description, category, price }),
        });
        loadProducts();
      }

      async function deleteProduct(id) {
        if (!confirm("هل أنت متأكد من حذف هذا المنتج؟")) return;
        await apiFetch(`/api/products/${id}`, { method: "DELETE" });
        loadProducts();
      }

      async function updateOrderStatus(id, status) {
        await apiFetch(`/api/orders/${id}/status`, {
          method: "PUT",
          body: JSON.stringify({ status }),
        });
        loadOrders();
      }

      ensureAuth();
      loadProducts();
      loadOrders();
      loadCustomers();
    </script>
  </body>
</html>
