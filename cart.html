<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A.H - سلة المشتريات</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="topbar">
          <div class="brand">
            <div class="brand-logo">A.H</div>
            <div>
              <div class="brand-title">A.H</div>
              <div class="brand-subtitle">متجر الملابس وشنط الظهر</div>
            </div>
          </div>
          <div>
            <a href="index.html" class="btn btn-secondary">العودة للمتجر</a>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="products">
        <div class="section-title">
          <div>
            <h2>سلة المشتريات</h2>
            <p>راجع المنتجات، عدّل الكميات أو اتمم الدفع.</p>
          </div>
        </div>

        <div class="cart-page-grid">
          <div class="cart-items" id="cartItems"></div>

          <aside class="cart-summary" style="max-width: 360px">
            <h3>تفاصيل الطلب</h3>
            <ul class="order-summary">
              <li>
                <span>مجموع المنتجات</span
                ><strong id="subtotalText">0 جنيه</strong>
              </li>
              <li><span>التوصيل</span><strong>مجاني</strong></li>
              <li>
                <span>الإجمالي</span><strong id="totalText">0 جنيه</strong>
              </li>
            </ul>
            <div class="checkout-form">
              <label>
                <span>الاسم</span>
                <input type="text" id="customerName" placeholder="اكتب اسمك" />
              </label>
              <label>
                <span>رقم الهاتف</span>
                <input
                  type="tel"
                  id="customerPhone"
                  placeholder="010xxxxxxxx"
                />
              </label>
              <label>
                <span>العنوان</span>
                <textarea
                  id="customerAddress"
                  placeholder="عنوان التوصيل"
                  rows="3"
                ></textarea>
              </label>
            </div>
            <div class="payment-methods">
              <label class="payment-option">
                <span>بطاقة ائتمان</span>
                <input type="radio" name="payment" value="card" />
              </label>
              <label class="payment-option">
                <span>الدفع عند الاستلام</span>
                <input type="radio" name="payment" value="cod" checked />
              </label>
            </div>
            <div class="payment-info" id="paymentInfo">
              <p>اختر طريقة الدفع: بطاقة ائتمان أو الدفع عند الاستلام.</p>
            </div>
            <div class="checkout-actions">
              <a href="index.html" class="btn btn-secondary">متابعة التسوق</a>
              <button class="btn btn-primary" onclick="checkout()">
                إتمام الطلب
              </button>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
